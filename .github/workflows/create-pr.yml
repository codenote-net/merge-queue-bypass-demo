name: Create PR
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name to create PR from"
        required: true
      title:
        description: "PR title"
        required: true
      body:
        description: "PR body"
        required: true
jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
      - run: |
          gh pr create \
            --head "${{ inputs.branch }}" \
            --title "${{ inputs.title }}" \
            --body "${{ inputs.body }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
